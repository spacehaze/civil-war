<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mississippi River — Forest, Daylight</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: Georgia, "Times New Roman", serif; color: #d4c4a0; }
  #root { width: 100vw; height: 100vh; }

  @keyframes cloudDrift {
    0%   { transform: translateX(-200px); }
    100% { transform: translateX(2200px); }
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }
  @keyframes canopySway {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }
  @keyframes deerIdle {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-0.4px); }
  }
  @keyframes deerDrink {
    0%, 60%, 100% { transform: rotate(0deg); }
    65%, 90%      { transform: rotate(28deg) translate(2px, 4px); }
  }
  @keyframes birdFlap {
    0%   { transform: scaleY(1); }
    100% { transform: scaleY(0.5); }
  }
  @keyframes frogBreathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.06); }
  }
  @keyframes squirrelTwitch {
    0%, 80%, 100% { transform: rotate(0); }
    85% { transform: rotate(-4deg); }
    90% { transform: rotate(4deg); }
  }
  @keyframes rabbitNibble {
    0%, 100% { transform: translateY(0) rotate(0); }
    25% { transform: translateY(-0.4px) rotate(-1deg); }
    50% { transform: translateY(0.2px) rotate(1deg); }
    75% { transform: translateY(-0.3px) rotate(-1deg); }
  }
  @keyframes fishJump {
    0%, 88%, 100% { transform: translateY(80px) scaleY(0.1); opacity: 0; }
    90%   { transform: translateY(0) scaleY(1) rotate(-15deg); opacity: 1; }
    93%   { transform: translateY(-30px) scaleY(1) rotate(0deg); opacity: 1; }
    96%   { transform: translateY(0) scaleY(1) rotate(15deg); opacity: 1; }
  }
  @keyframes boatBob {
    0%, 100% { transform: translateY(0) rotate(-0.5deg); }
    50%      { transform: translateY(-2px) rotate(0.5deg); }
  }
  @keyframes wingFlap {
    0%   { transform: scaleX(1); }
    100% { transform: scaleX(0.3); }
  }
  @keyframes flutterPath0 {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(60px,-30px); }
    50%  { transform: translate(120px,10px); }
    75%  { transform: translate(80px,40px); }
    100% { transform: translate(0,0); }
  }
  @keyframes flutterPath1 {
    0%   { transform: translate(0,0); }
    33%  { transform: translate(-80px,-20px); }
    66%  { transform: translate(40px,30px); }
    100% { transform: translate(0,0); }
  }
  @keyframes flutterPath2 {
    0%   { transform: translate(0,0); }
    50%  { transform: translate(50px,-60px); }
    100% { transform: translate(0,0); }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const PALETTE = {
  skyTop: "#5fa8d8",
  skyMid: "#9fc8e6",
  skyHorizon: "#dceaf2",
  sun: "#fff4c8",
  sunHalo: "#ffe88a",
  cloudHi: "#ffffff",
  cloud: "#dde8ee",
  forestFar: "#5e7a48",
  forestMid: "#3e5a32",
  forestNear: "#244020",
  canopyHi: "#7ea058",
  trunkDark: "#2a1d10",
  trunkMid: "#5a4028",
  trunkHi: "#8a6840",
  riverFar: "#9fc8d8",
  riverMid: "#6fa8c0",
  riverNear: "#4e8aa6",
  riverShine: "#e8f4fa",
  sand: "#d6c08a",
  sandShade: "#a88c5e",
  rock: "#8a8278",
  rockHi: "#b8b0a4",
  rockShade: "#5a5048",
  ground: "#3e2e1a",
  grass: "#5e7a3a",
  grassHi: "#88a85a",
};

const SUN_X = 1380;
const SUN_Y = 220;

function Defs({ p }) {
  return (
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.skyTop} />
        <stop offset="60%" stopColor={p.skyMid} />
        <stop offset="100%" stopColor={p.skyHorizon} />
      </linearGradient>
      <radialGradient id="sunHalo" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor={p.sunHalo} stopOpacity="0.7" />
        <stop offset="50%" stopColor={p.sunHalo} stopOpacity="0.25" />
        <stop offset="100%" stopColor={p.sunHalo} stopOpacity="0" />
      </radialGradient>
      <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.riverFar} />
        <stop offset="50%" stopColor={p.riverMid} />
        <stop offset="100%" stopColor={p.riverNear} />
      </linearGradient>
      <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.forestMid} />
        <stop offset="100%" stopColor={p.forestNear} />
      </linearGradient>
      <linearGradient id="bankGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.sand} />
        <stop offset="100%" stopColor={p.sandShade} />
      </linearGradient>
      <radialGradient id="canopyDab" cx="0.5" cy="0.4" r="0.6">
        <stop offset="0%" stopColor={p.canopyHi} stopOpacity="1" />
        <stop offset="60%" stopColor={p.forestMid} stopOpacity="1" />
        <stop offset="100%" stopColor={p.forestNear} stopOpacity="1" />
      </radialGradient>
      <filter id="softBlur"><feGaussianBlur stdDeviation="2" /></filter>
      <filter id="bigBlur"><feGaussianBlur stdDeviation="6" /></filter>
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="2" />
        <feColorMatrix values="0 0 0 0 0.5  0 0 0 0 0.45  0 0 0 0 0.4  0 0 0 0.10 0" />
        <feComposite in2="SourceGraphic" operator="in" />
      </filter>
    </defs>
  );
}

function Sky({ p, sunX, sunY }) {
  return (
    <g>
      <rect x="0" y="0" width="1920" height="1080" fill="url(#skyGrad)" />
      <circle cx={sunX} cy={sunY} r="280" fill="url(#sunHalo)" />
      <circle cx={sunX} cy={sunY} r="160" fill="url(#sunHalo)" opacity="0.6" />
      <circle cx={sunX} cy={sunY} r="58" fill={p.sun} />
      <circle cx={sunX} cy={sunY} r="58" fill="#fff" opacity="0.4" />
      <g opacity="0.18">
        <path d={`M${sunX},${sunY} L${sunX-400},${sunY+800} L${sunX-340},${sunY+800} Z`} fill="#fff" />
        <path d={`M${sunX},${sunY} L${sunX-220},${sunY+820} L${sunX-180},${sunY+820} Z`} fill="#fff" />
        <path d={`M${sunX},${sunY} L${sunX+200},${sunY+820} L${sunX+250},${sunY+820} Z`} fill="#fff" />
      </g>
    </g>
  );
}

function Clouds({ p }) {
  const clouds = [
    { x: 200, y: 180, scale: 1.0, dur: 90, delay: 0 },
    { x: 700, y: 140, scale: 1.4, dur: 110, delay: 20 },
    { x: 1100, y: 220, scale: 0.9, dur: 80, delay: 40 },
    { x: 1620, y: 160, scale: 1.2, dur: 100, delay: 10 },
    { x: 480, y: 320, scale: 0.7, dur: 70, delay: 30 },
  ];
  return (
    <g>
      {clouds.map((c, i) => (
        <g key={i} style={{ animation: `cloudDrift ${c.dur}s linear ${c.delay}s infinite` }}>
          <g transform={`translate(${c.x},${c.y}) scale(${c.scale})`}>
            <ellipse cx="-40" cy="6" rx="50" ry="14" fill={p.cloud} />
            <ellipse cx="-10" cy="-4" rx="44" ry="18" fill={p.cloudHi} />
            <ellipse cx="30" cy="0" rx="56" ry="20" fill={p.cloudHi} />
            <ellipse cx="60" cy="6" rx="36" ry="12" fill={p.cloud} />
            <ellipse cx="14" cy="-12" rx="32" ry="14" fill={p.cloudHi} />
          </g>
        </g>
      ))}
    </g>
  );
}

function FarForest({ p }) {
  return (
    <g>
      <path d="M0,560 Q200,540 400,548 T800,540 Q1100,532 1400,544 T1920,540 L1920,640 L0,640 Z" fill={p.forestFar} opacity="0.75" />
      <g fill={p.forestFar}>
        {Array.from({length: 80}).map((_, i) => {
          const x = i * 24 + (i*7 % 11);
          const h = 8 + (i*3) % 16;
          return <path key={i} d={`M${x},548 Q${x-4},${548-h} ${x},${548-h-3} Q${x+4},${548-h} ${x},548 Z`} />;
        })}
      </g>
    </g>
  );
}

function Tree({ x, y, scale = 1, variant = 0, p }) {
  const trunkW = 26 * scale;
  const seed = variant * 7;
  return (
    <g transform={`translate(${x},${y})`}>
      <ellipse cx="0" cy="4" rx={trunkW*0.9} ry={6*scale} fill="#000" opacity="0.35" />
      <path d={`M${-trunkW/2},0 Q${-trunkW/2 - 3},${-80*scale} ${-trunkW/2 + 4},${-180*scale} L${trunkW/2 - 4},${-180*scale} Q${trunkW/2 + 3},${-80*scale} ${trunkW/2},0 Z`} fill={p.trunkMid} />
      <path d={`M${-trunkW/2 + 3},0 Q${-trunkW/2},${-80*scale} ${-trunkW/2 + 6},${-180*scale}`} stroke={p.trunkDark} strokeWidth="3" fill="none" opacity="0.7" />
      <path d={`M${trunkW/2 - 3},0 Q${trunkW/2},${-80*scale} ${trunkW/2 - 6},${-180*scale}`} stroke={p.trunkHi} strokeWidth="2" fill="none" opacity="0.5" />
      <path d={`M${-trunkW/2},0 Q${-trunkW/2-12},4 ${-trunkW/2-22},2 M${trunkW/2},0 Q${trunkW/2+12},4 ${trunkW/2+20},2`} stroke={p.trunkDark} strokeWidth="3" fill="none" />
      <g style={{ transformOrigin: `0px ${-180*scale}px`, animation: `canopySway 7s ease-in-out ${variant * 0.7}s infinite` }}>
        <ellipse cx="0" cy={-200*scale} rx={140*scale} ry={120*scale} fill="url(#canopyDab)" />
        <ellipse cx={-60*scale} cy={-180*scale} rx={90*scale} ry={75*scale} fill="url(#canopyDab)" />
        <ellipse cx={70*scale} cy={-190*scale} rx={100*scale} ry={80*scale} fill="url(#canopyDab)" />
        <ellipse cx={-30*scale} cy={-260*scale} rx={80*scale} ry={60*scale} fill="url(#canopyDab)" />
        <ellipse cx={50*scale} cy={-250*scale} rx={70*scale} ry={55*scale} fill="url(#canopyDab)" />
        <g fill={p.canopyHi} opacity="0.85">
          <ellipse cx={-20*scale} cy={-280*scale} rx={28*scale} ry={20*scale} />
          <ellipse cx={30*scale} cy={-272*scale} rx={32*scale} ry={22*scale} />
          <ellipse cx={70*scale} cy={-240*scale} rx={26*scale} ry={18*scale} />
          <ellipse cx={-70*scale} cy={-210*scale} rx={22*scale} ry={16*scale} />
          <ellipse cx={90*scale} cy={-200*scale} rx={20*scale} ry={14*scale} />
        </g>
        <g fill={p.forestNear} opacity="0.55">
          <ellipse cx={-90*scale} cy={-150*scale} rx={30*scale} ry={22*scale} />
          <ellipse cx={80*scale} cy={-150*scale} rx={28*scale} ry={20*scale} />
          <ellipse cx={0} cy={-140*scale} rx={36*scale} ry={20*scale} />
        </g>
        <g fill={p.canopyHi} opacity="0.7">
          {Array.from({length: 24}).map((_, i) => {
            const a = ((i + seed) * 37) % 360 * Math.PI / 180;
            const r = 60 + ((i*11) % 80);
            const dx = Math.cos(a) * r * scale;
            const dy = Math.sin(a) * r * 0.85 * scale - 200*scale;
            return <circle key={i} cx={dx} cy={dy} r={3*scale} />;
          })}
        </g>
      </g>
    </g>
  );
}

function MidForest({ p }) {
  const trees = [
    { x: 60,   y: 700, scale: 0.95, v: 0 },
    { x: 200,  y: 712, scale: 0.85, v: 1 },
    { x: 360,  y: 700, scale: 1.05, v: 2 },
    { x: 1620, y: 706, scale: 0.95, v: 3 },
    { x: 1780, y: 712, scale: 0.9,  v: 4 },
    { x: 1880, y: 718, scale: 0.75, v: 5 },
  ];
  return (
    <g>
      <path d="M0,640 Q120,610 280,628 T560,620 L560,820 L0,820 Z" fill="url(#forestGrad)" />
      <path d="M1380,620 Q1560,608 1740,624 T1920,616 L1920,820 L1380,820 Z" fill="url(#forestGrad)" />
      {trees.map((t, i) => <Tree key={i} {...t} p={p} />)}
    </g>
  );
}

function Riverbank({ p }) {
  return (
    <g>
      <path d="M0,790 Q120,775 280,785 Q420,792 540,810 L500,860 Q360,855 220,860 Q100,866 0,870 Z" fill={p.ground} />
      <path d="M1380,810 Q1500,792 1640,785 Q1800,775 1920,790 L1920,870 Q1820,866 1700,860 Q1560,855 1420,860 Z" fill={p.ground} />
      <path d="M420,855 Q480,852 540,860 L500,886 Q440,884 400,884 Z" fill="url(#bankGrad)" />
      <path d="M1380,860 Q1440,852 1500,855 L1520,884 Q1480,886 1420,886 Z" fill="url(#bankGrad)" />
      <g stroke={p.grass} strokeWidth="2" fill="none">
        {Array.from({length: 50}).map((_, i) => {
          const x = (i * 11) % 520 + ((i*13) % 7);
          const y = 790 + (i*7) % 60;
          return <path key={`l${i}`} d={`M${x},${y} L${x-2},${y-8} M${x},${y} L${x+1},${y-9} M${x},${y} L${x+3},${y-7}`} />;
        })}
        {Array.from({length: 50}).map((_, i) => {
          const x = 1400 + (i * 11) % 520 + ((i*13) % 7);
          const y = 790 + (i*7) % 60;
          return <path key={`r${i}`} d={`M${x},${y} L${x-2},${y-8} M${x},${y} L${x+1},${y-9} M${x},${y} L${x+3},${y-7}`} />;
        })}
      </g>
      <g stroke={p.grassHi} strokeWidth="1.4" fill="none">
        {Array.from({length: 26}).map((_, i) => {
          const x = (i * 17) % 520;
          const y = 794 + (i*5) % 60;
          return <path key={`lh${i}`} d={`M${x},${y} L${x+1},${y-7}`} />;
        })}
        {Array.from({length: 26}).map((_, i) => {
          const x = 1400 + (i * 17) % 520;
          const y = 794 + (i*5) % 60;
          return <path key={`rh${i}`} d={`M${x},${y} L${x+1},${y-7}`} />;
        })}
      </g>
    </g>
  );
}

function River({ p }) {
  return (
    <g>
      <path d="M0,870 Q100,866 220,860 Q360,855 500,860 Q420,855 540,810 Q700,800 960,808 Q1220,812 1380,810 Q1500,855 1420,860 Q1560,855 1700,860 Q1820,866 1920,870 L1920,1080 L0,1080 Z" fill="url(#riverGrad)" />
      <g stroke={p.riverShine} fill="none" opacity="0.55">
        <path d="M580,840 Q720,838 880,842 T1180,840 T1340,842" strokeWidth="1.2">
          <animate attributeName="d" dur="9s" repeatCount="indefinite"
            values="M580,840 Q720,838 880,842 T1180,840 T1340,842;
                    M580,842 Q720,840 880,844 T1180,842 T1340,844;
                    M580,840 Q720,838 880,842 T1180,840 T1340,842" />
        </path>
        <path d="M540,880 Q740,878 960,882 T1240,880 T1380,882" strokeWidth="1.2">
          <animate attributeName="d" dur="11s" repeatCount="indefinite"
            values="M540,880 Q740,878 960,882 T1240,880 T1380,882;
                    M540,882 Q740,880 960,884 T1240,882 T1380,884;
                    M540,880 Q740,878 960,882 T1240,880 T1380,882" />
        </path>
        <path d="M540,940 Q700,938 940,942 T1240,940 T1380,942" strokeWidth="1.4">
          <animate attributeName="d" dur="10s" repeatCount="indefinite"
            values="M540,940 Q700,938 940,942 T1240,940 T1380,942;
                    M540,942 Q700,940 940,944 T1240,942 T1380,944;
                    M540,940 Q700,938 940,942 T1240,940 T1380,942" />
        </path>
        <path d="M520,1010 Q700,1008 960,1012 T1280,1008 T1400,1010" strokeWidth="1.6">
          <animate attributeName="d" dur="12s" repeatCount="indefinite"
            values="M520,1010 Q700,1008 960,1012 T1280,1008 T1400,1010;
                    M520,1012 Q700,1010 960,1014 T1280,1010 T1400,1012;
                    M520,1010 Q700,1008 960,1012 T1280,1008 T1400,1010" />
        </path>
      </g>
      <g opacity="0.7" style={{ animation: "shimmer 6s ease-in-out infinite" }}>
        <ellipse cx="1100" cy="900" rx="280" ry="14" fill={p.riverShine} opacity="0.5" filter="url(#softBlur)" />
        <ellipse cx="1080" cy="920" rx="200" ry="10" fill={p.riverShine} opacity="0.6" filter="url(#softBlur)" />
        <ellipse cx="1140" cy="950" rx="240" ry="12" fill={p.riverShine} opacity="0.5" filter="url(#softBlur)" />
        <ellipse cx="1060" cy="980" rx="180" ry="8" fill={p.riverShine} opacity="0.55" filter="url(#softBlur)" />
      </g>
      <g opacity="0.35" style={{ filter: "blur(2px)" }}>
        <path d="M540,820 L540,920 L560,920 L560,820" fill={p.forestNear} />
        <path d="M1360,820 L1360,920 L1380,920 L1380,820" fill={p.forestNear} />
      </g>
    </g>
  );
}

function Rocks({ p }) {
  const rocks = [
    { x: 660, y: 920, w: 70, h: 30 },
    { x: 740, y: 950, w: 50, h: 22 },
    { x: 1240, y: 940, w: 90, h: 36 },
    { x: 1320, y: 970, w: 60, h: 26 },
    { x: 940, y: 1020, w: 110, h: 40 },
  ];
  return (
    <g>
      {rocks.map((r, i) => (
        <g key={i} transform={`translate(${r.x},${r.y})`}>
          <ellipse cx="0" cy={r.h+2} rx={r.w*1.2} ry="4" fill={p.riverShine} opacity="0.6" />
          <path d={`M${-r.w},0 Q${-r.w*0.8},${-r.h} ${-r.w*0.3},${-r.h*1.1} Q${r.w*0.4},${-r.h*1.2} ${r.w*0.7},${-r.h*0.9} Q${r.w},${-r.h*0.4} ${r.w*0.9},0 Z`} fill={p.rock} />
          <path d={`M${-r.w*0.6},${-r.h*0.7} Q${-r.w*0.2},${-r.h*1.0} ${r.w*0.3},${-r.h*1.1} Q${r.w*0.5},${-r.h*0.9} ${r.w*0.4},${-r.h*0.6}`} fill={p.rockHi} opacity="0.7" />
          <path d={`M${r.w*0.3},${-r.h*0.4} Q${r.w*0.7},${-r.h*0.2} ${r.w*0.9},0 L${-r.w*0.1},0 Q${r.w*0.1},${-r.h*0.3} ${r.w*0.3},${-r.h*0.4} Z`} fill={p.rockShade} opacity="0.6" />
          <path d={`M${-r.w*0.4},${-r.h*0.6} L${r.w*0.1},${-r.h*0.3}`} stroke={p.rockShade} strokeWidth="0.8" fill="none" opacity="0.6" />
        </g>
      ))}
    </g>
  );
}

function BankRocks({ p }) {
  return (
    <g>
      {[
        { x: 460, y: 940, s: 1.0 },
        { x: 1500, y: 945, s: 0.85 },
        { x: 90, y: 950, s: 0.7 },
        { x: 1840, y: 955, s: 0.9 },
      ].map((r, i) => (
        <g key={i} transform={`translate(${r.x},${r.y}) scale(${r.s})`}>
          <ellipse cx="0" cy="6" rx="44" ry="6" fill="#000" opacity="0.4" />
          <path d="M-44,0 Q-40,-30 -10,-36 Q20,-40 38,-30 Q48,-18 44,0 Z" fill={p.rock} />
          <path d="M-30,-22 Q-10,-34 18,-36 Q30,-30 28,-20" fill={p.rockHi} opacity="0.7" />
          <path d="M10,-12 Q30,-8 44,0 L0,0 Q4,-8 10,-12 Z" fill={p.rockShade} opacity="0.6" />
        </g>
      ))}
    </g>
  );
}

function Deer({ x, y, scale = 1 }) {
  return (
    <g transform={`translate(${x},${y}) scale(${scale})`}>
      <ellipse cx="20" cy="38" rx="48" ry="4" fill="#000" opacity="0.4" />
      <g style={{ transformOrigin: "0px 30px", animation: "deerIdle 6s ease-in-out infinite" }}>
        <path d="M-18,10 L-20,38 L-16,38 L-14,12 Z" fill="#7a4a28" />
        <path d="M-8,12 L-10,38 L-6,38 L-4,14 Z" fill="#7a4a28" />
        <path d="M22,10 L20,38 L24,38 L26,12 Z" fill="#7a4a28" />

          </div>
          <div style={{ fontSize: 15, marginTop: 4, fontStyle: "italic", opacity: 0.92 }}>
            ←/→ steer · SPACE to jump over rocks
          </div>
        </div>
      </div>
      <div style={{ position: "absolute", top: 28, right: 24, display: "flex", gap: 6, pointerEvents: "none" }}>
        {[0,1,2,3,4].map(i => (
          <div key={i} style={{
            width: 18, height: 18, borderRadius: 4,
            background: i < hp ? "#d44830" : "transparent",
            border: "1.5px solid rgba(232,216,176,0.55)",
          }} />
        ))}
      </div>
      <div style={{ position: "absolute", bottom: 28, left: "50%", transform: "translateX(-50%)", width: "min(60vw, 560px)", height: 3, background: "rgba(255,255,255,0.14)", borderRadius: 2, pointerEvents: "none" }}>
        <div style={{
          width: `${Math.min(100, progress * 100)}%`, height: "100%",
          background: "rgba(244,236,208,0.78)", borderRadius: 2, transition: "width 0.1s linear",
        }} />
      </div>
    </React.Fragment>
  );
}

function ForestRiver() {
  const p = PALETTE;
  const [boatX, setBoatX] = useState(BOAT_X_START);
  const [boatY, setBoatY] = useState(WATER_Y);
  const [hp, setHp] = useState(STARTING_HP);
  const [worldOffset, setWorldOffset] = useState(0);
  const [status, setStatus] = useState("playing");
  const [now, setNow] = useState(0);

  const vyRef = useRef(0);                // vertical velocity
  const keysRef = useRef({ left: false, right: false });
  const lastHitRef = useRef(-Infinity);

  // Keyboard input — SPACE/↑ jump when on water; ←/→ shift horizontally
  useEffect(() => {
    const onDown = (e) => {
      if (e.key === " " || e.code === "Space" || e.key === "ArrowUp") {
        e.preventDefault();
        if (status !== "playing") return;
        if (vyRef.current === 0) vyRef.current = JUMP_VELOCITY;
      } else if (e.key === "ArrowLeft") {
        keysRef.current.left = true; e.preventDefault();
      } else if (e.key === "ArrowRight") {
        keysRef.current.right = true; e.preventDefault();
      }
    };
    const onUp = (e) => {
      if (e.key === "ArrowLeft") keysRef.current.left = false;
      else if (e.key === "ArrowRight") keysRef.current.right = false;
    };
    window.addEventListener("keydown", onDown);
    window.addEventListener("keyup", onUp);
    return () => {
      window.removeEventListener("keydown", onDown);
      window.removeEventListener("keyup", onUp);
    };
  }, [status]);

  // Animation loop: scroll + horizontal movement + jump physics
  useEffect(() => {
    if (status !== "playing") return;
    let raf;
    const tick = (t) => {
      setNow(t);

      setWorldOffset((prev) => {
        const next = prev + SCROLL_SPEED;
        if (next >= WORLD_END) { setStatus("won"); return WORLD_END; }
        return next;
      });

      setBoatX((prev) => {
        const dx = (keysRef.current.right ? 1 : 0) - (keysRef.current.left ? 1 : 0);
        if (dx === 0) return prev;
        return Math.max(BOAT_X_BOUNDS[0], Math.min(BOAT_X_BOUNDS[1], prev + dx * BOAT_HSPEED));
      });

      setBoatY((prev) => {
        if (vyRef.current === 0 && prev >= WATER_Y) return WATER_Y;
        let nextY = prev + vyRef.current;
        vyRef.current = vyRef.current + GRAVITY;
        if (nextY >= WATER_Y) {
          nextY = WATER_Y;
          vyRef.current = 0;
        }
        return nextY;
      });

      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [status]);

  // Collision check on each render
  useEffect(() => {
    if (status !== "playing") return;
    if (now - lastHitRef.current < HIT_INVULN_MS) return;
    for (const r of ROCKS) {
      const screenX = r.worldX - worldOffset;
      if (screenX < -200 || screenX > 2120) continue;
      const d = Math.hypot(screenX - boatX, r.y - boatY);
      if (d < ROCK_RADIUS + BOAT_RADIUS) {
        lastHitRef.current = now;
        setHp((prev) => {
          const next = prev - 1;
          if (next <= 0) setStatus("lost");
          return next;
        });
        return;
      }
    }
  }, [boatX, boatY, worldOffset, now, status]);

  const flashing = (now - lastHitRef.current) < FLASH_MS;
  const progress = worldOffset / WORLD_END;

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", overflow: "hidden" }}>
      <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" style={{ width: "100%", height: "100%", display: "block" }}>
        <Defs p={p} />
        <Sky p={p} sunX={SUN_X} sunY={SUN_Y} />
        <Clouds p={p} />
        <Birds />
        <FarForest p={p} />
        <MidForest p={p} />
        <Riverbank p={p} />
        <River p={p} />

        {/* Rocks scrolling past */}
        <g>
          {ROCKS.map((r, i) => {
            const screenX = r.worldX - worldOffset;
            if (screenX < -200 || screenX > 2120) return null;
            return <JaggedRock key={i} x={screenX} y={r.y} />;
          })}
        </g>

        {/* Player boat */}
        <PlayerBoat x={boatX} y={boatY} flash={flashing} />

        {/* Bank decoration */}
        <BankRocks p={p} />
        <Deer x={260} y={770} scale={1.4} />
        <Squirrel x={420} y={790} scale={1.3} />
        <Rabbit x={1640} y={780} scale={1.3} />
        <Frog x={680} y={895} scale={1.3} />
        <Butterfly x={300} y={780} color="#e8a020" dur={14} delay={0} />
        <Butterfly x={1700} y={800} color="#d44830" dur={16} delay={3} />
        <Butterfly x={1200} y={760} color="#7a5ad8" dur={18} delay={6} />

        <ForegroundTree side="left" p={p} />
        <ForegroundTree side="right" p={p} />

        <Overlay />
      </svg>

      <RiverHUD hp={hp} status={status} progress={progress} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ForestRiver />);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Aftermath — Civil War Battlefield</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: Georgia, "Times New Roman", serif; color: #d4c4a0; }
  #root { width: 100vw; height: 100vh; }

  @keyframes flameFlicker {
    0%   { transform: scaleY(1)   scaleX(1)    skewX(0deg);   opacity: 1; }
    50%  { transform: scaleY(1.08) scaleX(0.94) skewX(-2deg);  opacity: 0.94; }
    100% { transform: scaleY(0.94) scaleX(1.06) skewX(2deg);   opacity: 1; }
  }
  @keyframes flameFlicker2 {
    0%   { transform: scaleY(1)    scaleX(1);    opacity: 1; }
    50%  { transform: scaleY(1.18) scaleX(0.86); opacity: 0.85; }
    100% { transform: scaleY(0.88) scaleX(1.12); opacity: 1; }
  }
  @keyframes flameGlow {
    0%, 100% { transform: scale(1);    opacity: 0.35; }
    50%      { transform: scale(1.18); opacity: 0.5; }
  }
  @keyframes smokeRise {
    0%   { transform: translateY(0)    scale(1);    opacity: 1; }
    50%  { transform: translateY(-30px) scale(1.05); opacity: 0.92; }
    100% { transform: translateY(0)    scale(1);    opacity: 1; }
  }
  @keyframes smokeDrift0 {
    0%   { transform: translate(0,0)        scale(1); }
    50%  { transform: translate(80px,-20px) scale(1.08); }
    100% { transform: translate(0,0)        scale(1); }
  }
  @keyframes smokeDrift1 {
    0%   { transform: translate(0,0)         scale(1); }
    50%  { transform: translate(-60px,-10px) scale(1.1); }
    100% { transform: translate(0,0)         scale(1); }
  }
  @keyframes smokeDrift2 {
    0%   { transform: translate(0,0)        scale(1); }
    50%  { transform: translate(40px,-26px) scale(1.05); }
    100% { transform: translate(0,0)        scale(1); }
  }
  @keyframes flagSway {
    0%, 100% { transform: rotate(-2deg) skewY(-1deg); }
    50%      { transform: rotate(3deg)  skewY(1deg); }
  }
  @keyframes crowFlap {
    0%   { transform: scaleY(1); }
    100% { transform: scaleY(0.65); }
  }
  @keyframes perchTwitch {
    0%, 80%, 100% { transform: rotate(0deg); }
    85% { transform: rotate(-12deg); }
    90% { transform: rotate(8deg); }
    95% { transform: rotate(-4deg); }
  }
  @keyframes rainFall {
    0%   { transform: translateY(0); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(1200px); opacity: 0.8; }
  }
  @keyframes soldierSway {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }
  @keyframes leaderSway {
    0%, 100% { transform: rotate(-0.6deg) translateY(0); }
    50%      { transform: rotate(0.8deg) translateY(-0.8px); }
  }
  @keyframes unitFlagSway {
    0%, 100% { transform: rotate(-3deg) skewY(-1deg); }
    50%      { transform: rotate(4deg) skewY(1deg); }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const PALETTE = {
  skyTop: "#2a1d1a",
  skyMid: "#5a3522",
  skyHorizon: "#a85a2a",
  skyEmber: "#d97a3a",
  smokeBase: "#3a2a25",
  smokeHi: "#7a5a48",
  ridgeFar: "#1f1611",
  ridgeMid: "#2a1d17",
  ridgeNear: "#1a110d",
  mudFar: "#3d2a1e",
  mudNear: "#1c1208",
  mudHi: "#5a3d28",
  bone: "#d8c9a8",
  boneShade: "#9a8a6a",
  metal: "#3a342e",
  metalHi: "#7a6f5e",
  wood: "#3a2618",
  woodHi: "#6a4a30",
  cloth: "#6a2a22",
  clothShade: "#3a1612",
  flame: "#ff8a3a",
  flameHot: "#ffcc6a",
  crow: "#0a0706",
  fog: "rgba(180,160,140,0.18)",
  rain: "rgba(180,170,160,0.35)",
};
const SMOKE_DENSITY = 0.85;
const FLAME_INTENSITY = 0.85;
const FOG_DENSITY = 0.5;

function Defs({ p }) {
  return (
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.skyTop} />
        <stop offset="55%" stopColor={p.skyMid} />
        <stop offset="88%" stopColor={p.skyHorizon} />
        <stop offset="100%" stopColor={p.skyEmber} />
      </linearGradient>
      <radialGradient id="emberGlow" cx="0.62" cy="0.95" r="0.5">
        <stop offset="0%" stopColor={p.skyEmber} stopOpacity="0.7" />
        <stop offset="40%" stopColor={p.skyHorizon} stopOpacity="0.3" />
        <stop offset="100%" stopColor={p.skyHorizon} stopOpacity="0" />
      </radialGradient>
      <linearGradient id="mudGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.mudFar} />
        <stop offset="40%" stopColor={p.mudHi} stopOpacity="0.4" />
        <stop offset="100%" stopColor={p.mudNear} />
      </linearGradient>
      <linearGradient id="puddleGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={p.skyEmber} stopOpacity="0.5" />
        <stop offset="100%" stopColor={p.mudNear} stopOpacity="0.9" />
      </linearGradient>
      <radialGradient id="flameGrad" cx="0.5" cy="0.6" r="0.6">
        <stop offset="0%" stopColor={p.flameHot} stopOpacity="1" />
        <stop offset="40%" stopColor={p.flame} stopOpacity="0.9" />
        <stop offset="100%" stopColor={p.flame} stopOpacity="0" />
      </radialGradient>
      <radialGradient id="flameCore" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor="#fff4d0" stopOpacity="1" />
        <stop offset="60%" stopColor={p.flameHot} stopOpacity="0.8" />
        <stop offset="100%" stopColor={p.flame} stopOpacity="0" />
      </radialGradient>
      <radialGradient id="smokeGrad" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stopColor={p.smokeHi} stopOpacity="0.55" />
        <stop offset="60%" stopColor={p.smokeBase} stopOpacity="0.25" />
        <stop offset="100%" stopColor={p.smokeBase} stopOpacity="0" />
      </radialGradient>
      <radialGradient id="bigSmoke" cx="0.5" cy="0.6" r="0.5">
        <stop offset="0%" stopColor={p.smokeHi} stopOpacity="0.5" />
        <stop offset="100%" stopColor={p.smokeBase} stopOpacity="0" />
      </radialGradient>
      <filter id="grain" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" />
        <feColorMatrix values="0 0 0 0 0.5  0 0 0 0 0.45  0 0 0 0 0.4  0 0 0 0.18 0" />
        <feComposite in2="SourceGraphic" operator="in" />
      </filter>
      <filter id="painterly" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5" />
        <feDisplacementMap in="SourceGraphic" scale="2.2" />
      </filter>
      <filter id="softBlur"><feGaussianBlur stdDeviation="2.2" /></filter>
      <filter id="bigBlur"><feGaussianBlur stdDeviation="5" /></filter>
      <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
      <pattern id="canvasTex" width="120" height="120" patternUnits="userSpaceOnUse">
        <rect width="120" height="120" fill="transparent" />
        <g opacity="0.08">
          {Array.from({length: 30}).map((_, i) => (
            <line key={i} x1="0" y1={i*4} x2="120" y2={i*4} stroke="#000" strokeWidth="0.4" />
          ))}
          {Array.from({length: 30}).map((_, i) => (
            <line key={"v"+i} x1={i*4} y1="0" x2={i*4} y2="120" stroke="#000" strokeWidth="0.3" />
          ))}
        </g>
      </pattern>
      <pattern id="mudSpatter" width="200" height="200" patternUnits="userSpaceOnUse">
        {Array.from({length: 40}).map((_, i) => {
          const x = (i * 53) % 200;
          const y = (i * 37 + 11) % 200;
          const r = 0.5 + ((i * 7) % 5) * 0.3;
          return <circle key={i} cx={x} cy={y} r={r} fill={p.mudNear} opacity={0.4} />;
        })}
      </pattern>
    </defs>
  );
}

function Sky({ p }) {
  return (
    <g>
      <rect x="0" y="0" width="1920" height="900" fill="url(#skyGrad)" />
      <ellipse cx="1180" cy="870" rx="900" ry="220" fill="url(#emberGlow)" />
      <g opacity="0.45" filter="url(#softBlur)">
        <ellipse cx="400" cy="320" rx="280" ry="40" fill={p.smokeBase} />
        <ellipse cx="900" cy="240" rx="350" ry="32" fill={p.smokeBase} />
        <ellipse cx="1500" cy="290" rx="300" ry="38" fill={p.smokeBase} />
        <ellipse cx="200" cy="450" rx="220" ry="28" fill={p.smokeHi} opacity="0.3" />
        <ellipse cx="1700" cy="430" rx="260" ry="24" fill={p.smokeHi} opacity="0.3" />
      </g>
    </g>
  );
}

function DistantSmoke({ p }) {
  const cols = [
    { x: 280, baseScale: 1.0, delay: 0 },
    { x: 520, baseScale: 0.7, delay: 3 },
    { x: 1240, baseScale: 1.2, delay: 1.5 },
    { x: 1480, baseScale: 0.9, delay: 4 },
    { x: 1720, baseScale: 0.8, delay: 2 },
  ];
  return (
    <g opacity="0.85">
      {cols.map((c, i) => (
        <g key={i} style={{ transformOrigin: `${c.x}px 870px`, animation: `smokeRise ${24+i*3}s ease-in-out ${c.delay}s infinite` }}>
          <ellipse cx={c.x} cy="870" rx={70*c.baseScale} ry="16" fill={p.smokeBase} opacity="0.7" />
          <ellipse cx={c.x-8} cy="800" rx={60*c.baseScale} ry="40" fill={p.smokeBase} opacity="0.6" filter="url(#softBlur)" />
          <ellipse cx={c.x+12} cy="720" rx={75*c.baseScale} ry="55" fill={p.smokeBase} opacity="0.5" filter="url(#softBlur)" />
          <ellipse cx={c.x-4} cy="620" rx={90*c.baseScale} ry="65" fill={p.smokeHi} opacity="0.35" filter="url(#bigBlur)" />
          <ellipse cx={c.x+20} cy="500" rx={110*c.baseScale} ry="70" fill={p.smokeHi} opacity="0.22" filter="url(#bigBlur)" />
          <ellipse cx={c.x-30} cy="380" rx={130*c.baseScale} ry="60" fill={p.smokeHi} opacity="0.12" filter="url(#bigBlur)" />
        </g>
      ))}
    </g>
  );
}

function FarRidge({ p }) {
  return (
    <g>
      <path d="M0,830 L0,790 Q120,775 240,785 T480,780 Q620,770 760,778 T1000,775 Q1180,765 1340,772 T1620,770 Q1780,762 1920,770 L1920,830 Z" fill={p.ridgeFar} opacity="0.85" />
      <g fill={p.ridgeFar} opacity="0.9">
        {Array.from({length: 60}).map((_, i) => {
          const x = i * 32 + (i*7 % 13);
          const h = 8 + (i * 3) % 18;
          return <path key={i} d={`M${x},785 Q${x-3},${785-h} ${x},${785-h-2} Q${x+3},${785-h} ${x},785 Z`} />;
        })}
      </g>
      <path d="M0,860 L0,830 Q160,820 320,832 T640,828 Q820,818 1000,830 T1360,830 Q1560,820 1760,830 T1920,830 L1920,860 Z" fill={p.ridgeMid} />
      <g fill={p.ridgeMid} opacity="0.95">
        <path d="M1380,830 L1394,808 L1408,830 Z" />
        <path d="M1410,830 L1426,810 L1442,830 Z" />
        <path d="M1448,830 L1462,812 L1476,830 Z" />
        <path d="M340,830 L352,815 L364,830 Z" />
        <path d="M368,830 L378,818 L388,830 Z" />
      </g>
      <g stroke={p.ridgeNear} strokeWidth="1.5" fill="none" opacity="0.95">
        <path d="M180,830 L182,790 L178,792 M182,805 L172,795 M182,800 L192,793" />
        <path d="M860,832 L862,798 M862,810 L852,802 M862,815 L872,808" />
        <path d="M1620,830 L1618,795 M1618,810 L1610,802 M1618,815 L1626,805" />
      </g>
    </g>
  );
}

function NearRidge({ p }) {
  return (
    <g>
      <path d="M0,920 L0,870 Q200,855 400,872 T800,868 Q1080,856 1320,870 T1700,864 Q1840,858 1920,866 L1920,920 Z" fill={p.ridgeNear} />
      <g stroke={p.wood} strokeWidth="2.4" opacity="0.85" fill="none">
        <path d="M40,866 L40,838 M40,850 L120,852" />
        <path d="M120,852 L122,830 M120,852 L200,856 L200,832" />
        <path d="M200,856 L260,860" />
        <path d="M540,866 L540,840 M540,852 L600,848 L605,820" />
        <path d="M1220,864 L1222,836 M1222,848 L1310,852 L1310,830" />
        <path d="M1310,852 L1380,855" />
        <path d="M1750,862 L1752,838 M1752,850 L1820,852" />
      </g>
      <g stroke={p.ridgeNear} strokeWidth="3" fill="none" opacity="1">
        <path d="M1080,870 L1078,760 M1078,800 L1040,770 M1078,790 L1115,765 M1078,820 L1055,800 M1078,810 L1100,795 M1078,775 L1062,760 M1078,770 L1095,758" />
      </g>
    </g>
  );
}

function Mud({ p }) {
  return (
    <g>
      <rect x="0" y="900" width="1920" height="280" fill="url(#mudGrad)" />
      <rect x="0" y="900" width="1920" height="280" fill="url(#mudSpatter)" opacity="0.35" />
      <ellipse cx="320" cy="1010" rx="180" ry="14" fill="url(#puddleGrad)" opacity="0.7" />
      <ellipse cx="320" cy="1010" rx="180" ry="14" fill="none" stroke={p.mudHi} strokeWidth="0.6" opacity="0.5" />
      <ellipse cx="1480" cy="1060" rx="240" ry="18" fill="url(#puddleGrad)" opacity="0.6" />
      <ellipse cx="900" cy="1130" rx="320" ry="22" fill="url(#puddleGrad)" opacity="0.5" />
      <ellipse cx="1700" cy="980" rx="120" ry="9" fill="url(#puddleGrad)" opacity="0.55" />
      <g stroke={p.mudNear} strokeWidth="3" opacity="0.5" fill="none">
        <path d="M-20,950 Q200,955 460,948 T920,952 T1480,946 T1940,950" />
        <path d="M-20,962 Q200,968 460,960 T920,964 T1480,958 T1940,962" />
        <path d="M-20,1080 Q300,1090 600,1082 T1200,1086 T1940,1080" />
      </g>
      <g fill={p.mudNear} opacity="0.7">
        {Array.from({length: 80}).map((_, i) => {
          const x = (i * 73) % 1920;
          const y = 920 + (i * 41) % 250;
          const r = 1 + (i * 3) % 4;
          return <circle key={i} cx={x} cy={y} r={r} />;
        })}
      </g>
    </g>
  );
}

function ScatteredDebris({ p }) {
  return (
    <g>
      <g transform="translate(180,950) rotate(-12)">
        <rect x="0" y="0" width="120" height="3" fill={p.wood} />
        <rect x="115" y="-1" width="40" height="5" fill={p.metal} />
        <rect x="-8" y="-3" width="20" height="9" fill={p.wood} />
        <circle cx="120" cy="1" r="2" fill={p.metalHi} />
      </g>
      <g transform="translate(680,930) rotate(15)">
        <path d="M0,0 L2,-50 L-2,-50 Z" fill={p.metalHi} />
        <rect x="-3" y="0" width="6" height="14" fill={p.wood} />
      </g>
      <g transform="translate(1240,960) rotate(72)">
        <path d="M-2,0 L2,0 L1.5,-90 L0,-95 L-1.5,-90 Z" fill={p.metalHi} opacity="0.95" />
        <rect x="-4" y="0" width="8" height="14" fill={p.wood} />
        <path d="M-12,14 L12,14 L10,16 L-10,16 Z" fill={p.metalHi} />
        <rect x="-2" y="16" width="4" height="22" fill={p.wood} />
      </g>
      <g transform="translate(560,1080)">
        <ellipse cx="0" cy="0" rx="22" ry="20" fill={p.metal} />
        <ellipse cx="-5" cy="-5" rx="6" ry="4" fill={p.metalHi} opacity="0.6" />
        <rect x="-3" y="-22" width="6" height="6" fill={p.wood} />
      </g>
      <g transform="translate(1380,1100) rotate(-8)">
        <ellipse cx="0" cy="0" rx="32" ry="9" fill="#2a3548" />
        <path d="M-30,0 Q-30,-20 0,-22 Q30,-20 30,0 Z" fill="#3a4558" />
        <ellipse cx="0" cy="-22" rx="30" ry="4" fill="#2a3548" />
        <rect x="-14" y="-1" width="28" height="3" fill="#1a1a25" />
      </g>
      <g transform="translate(1600,1090) rotate(28)">
        <ellipse cx="0" cy="0" rx="44" ry="36" fill={p.cloth} />
        <ellipse cx="0" cy="0" rx="44" ry="36" fill="none" stroke={p.clothShade} strokeWidth="1.5" />
        <ellipse cx="0" cy="0" rx="40" ry="32" fill="#e8d8b0" opacity="0.4" />
        <path d="M-32,-22 L32,-12 M-32,-12 L32,-2 M-32,-2 L32,8 M-32,8 L32,18 M-32,18 L32,28" stroke={p.clothShade} strokeWidth="1.2" opacity="0.6" />
      </g>
      <g transform="translate(820,1120) rotate(20)">
        <path d="M0,0 L0,-26 Q0,-32 6,-32 L18,-32 Q24,-32 24,-26 L24,-2 L40,-2 L42,4 L0,4 Z" fill={p.wood} />
        <path d="M2,-26 L22,-26" stroke={p.woodHi} strokeWidth="0.6" opacity="0.5" />
      </g>
      <g opacity="0.85">
        <rect x="380" y="1140" width="22" height="16" fill="#d4c8a8" transform="rotate(15 391 1148)" />
        <rect x="360" y="1148" width="18" height="14" fill="#c8baa0" transform="rotate(-22 369 1155)" />
        <rect x="1020" y="1140" width="20" height="14" fill="#d8ccaa" transform="rotate(8 1030 1147)" />
      </g>
    </g>
  );
}

function HorseSkeleton({ p }) {
  return (
    <g transform="translate(420,1100)" filter="url(#painterly)">
      <ellipse cx="120" cy="60" rx="180" ry="14" fill="#000" opacity="0.35" />
      <g stroke={p.bone} strokeWidth="6" strokeLinecap="round" fill="none">
        <path d="M-20,30 Q60,8 160,18 Q220,24 252,40" />
        <path d="M10,28 Q4,60 -2,72" />
        <path d="M30,22 Q26,62 22,80" />
        <path d="M52,16 Q50,64 48,86" />
        <path d="M76,12 Q76,66 76,90" />
        <path d="M100,12 Q102,66 104,88" />
        <path d="M126,14 Q130,64 134,84" />
        <path d="M150,18 Q156,60 162,76" />
        <path d="M174,22 Q180,54 186,68" />
      </g>
      <g transform="translate(-46,28) rotate(-18)">
        <path d="M0,0 Q-2,-14 14,-18 Q34,-22 46,-12 Q56,-4 52,8 Q48,18 36,20 Q22,22 12,18 Q4,16 0,8 Z" fill={p.bone} />
        <ellipse cx="22" cy="-2" rx="4" ry="5" fill="#0a0606" />
        <ellipse cx="38" cy="0" rx="3" ry="4" fill="#0a0606" />
        <path d="M44,14 L48,18 L46,16 L50,18 L48,16 L52,18" stroke={p.boneShade} strokeWidth="0.8" />
        <path d="M52,8 Q60,8 62,4" stroke={p.bone} strokeWidth="3" fill="none" />
      </g>
      <g stroke={p.bone} strokeWidth="5" strokeLinecap="round" fill="none">
        <path d="M236,42 L260,72 L268,108" />
        <path d="M250,42 L284,68 L300,98" />
        <path d="M-10,40 L-30,72 L-26,100" />
        <path d="M0,42 L-14,76 L-2,104" />
      </g>
      <g fill={p.boneShade}>
        <ellipse cx="268" cy="110" rx="6" ry="3" />
        <ellipse cx="300" cy="100" rx="6" ry="3" />
        <ellipse cx="-26" cy="102" rx="6" ry="3" />
        <ellipse cx="-2" cy="106" rx="6" ry="3" />
      </g>
      <g fill={p.wood} opacity="0.55">
        <path d="M-30,18 Q-22,8 -10,12 Q-4,16 -8,22 Z" />
        <path d="M-6,30 Q4,22 12,30 Q6,36 -2,34 Z" />
      </g>
      <path d="M50,16 Q60,10 84,14" stroke={p.cloth} strokeWidth="3" fill="none" opacity="0.7" />
      <circle cx="86" cy="15" r="3" fill={p.metalHi} opacity="0.7" />
    </g>
  );
}

function BrokenWagon({ p }) {
  return (
    <g transform="translate(1080,820) rotate(-8)" filter="url(#painterly)">
      <ellipse cx="180" cy="260" rx="280" ry="18" fill="#000" opacity="0.4" />
      <g transform="skewX(-3)">

function Unit({ def, hp, isDead, isSelected, isTargetable, onClick, p }) {
  const visual = (() => {
    if (def.role === "flagbearer") return <FlagBearer x={def.x} y={def.y} scale={def.scale} faction={def.faction} p={p} />;
    if (def.role === "lincoln") return <Lincoln x={def.x} y={def.y} scale={def.scale} p={p} />;
    if (def.role === "grant") return <Grant x={def.x} y={def.y} scale={def.scale} p={p} />;
    return <Soldier x={def.x} y={def.y} scale={def.scale} faction={def.faction} pose={def.pose || "march"} facing={def.facing || 1} delay={def.delay || 0} p={p} />;
  })();

  if (isDead) {
    return <g style={{ opacity: 0.18, pointerEvents: "none" }}>{visual}</g>;
  }

  const ringColor = isSelected ? "#ffd84a" : isTargetable ? "#ff6a3a" : null;
  const ringW = 36 + def.scale * 4;
  const hpColor = def.faction === "union" ? "#5a8ad8" : "#d8a868";

  return (
    <g style={{ cursor: onClick ? "pointer" : "default" }} onClick={onClick || undefined}>
      <rect x={def.x - 30} y={def.y - 90} width={60} height={148} fill="transparent" pointerEvents="all" />
      {ringColor && (
        <ellipse cx={def.x} cy={def.y + 48} rx={ringW} ry={6} fill="none" stroke={ringColor} strokeWidth="3" opacity="0.85" pointerEvents="none">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite" />
        </ellipse>
      )}
      {visual}
      <g transform={`translate(${def.x}, ${def.y - 78})`} pointerEvents="none">
        {[0, 1, 2].map((i) => (
          <rect key={i} x={-13 + i * 9} y={0} width={7} height={4} rx={1}
            fill={i < hp ? hpColor : "#1a1a1a"} stroke="#000" strokeWidth="0.6" opacity="0.95" />
        ))}
      </g>
    </g>
  );
}

function Soldiers({ p, units, selected, attackable, getClickHandler }) {
  const renderUnit = (def) => {
    const u = units[def.id];
    const isDead = u.hp <= 0;
    return (
      <Unit key={def.id} def={def} hp={u.hp} isDead={isDead}
        isSelected={selected === def.id}
        isTargetable={attackable.includes(def.id)}
        onClick={isDead ? null : getClickHandler(def.id)} p={p} />
    );
  };
  return (
    <g>
      <g style={{ filter: "drop-shadow(0 4px 6px rgba(0,0,0,0.55))" }}>
        {UNIT_DEFS.filter((d) => d.faction === "union").map(renderUnit)}
      </g>
      <g style={{ filter: "drop-shadow(0 4px 6px rgba(0,0,0,0.55))" }}>
        {UNIT_DEFS.filter((d) => d.faction === "confederate").map(renderUnit)}
      </g>
    </g>
  );
}

    { x: 800, y: 950, rx: 280, ry: 30, dur: 36, delay: 10, opacity: 0.28 },

    </g>
  );
}

function HUD({ playerSide, turn, status, selected, message }) {
  const sideName = playerSide === "union" ? "Union" : "Confederate";
  const turnText = status === "playing"
    ? (turn === "player"
        ? (selected ? "Click an enemy to attack" : "Your turn — pick one of your units")
        : (message || "Enemy turn…"))
    : "";

  if (status === "won" || status === "lost") {
    const won = status === "won";
    return (
      <div style={{
        position: "absolute", inset: 0,
        background: "rgba(8,6,10,0.78)",
        display: "flex", alignItems: "center", justifyContent: "center",
        backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)",
        color: "#e8d8b0", fontFamily: 'Georgia, "Times New Roman", serif',
      }}>
        <div style={{ textAlign: "center", maxWidth: 540, padding: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.4em", textTransform: "uppercase", color: "#d4a838", marginBottom: 16 }}>
            {won ? "After the Battle" : "The Field is Lost"}
          </div>
          <h1 style={{ fontSize: 88, fontWeight: 400, margin: "0 0 12px", lineHeight: 1 }}>
            {won ? "Victory" : "Defeat"}
          </h1>
          <p style={{ fontSize: 18, fontStyle: "italic", opacity: 0.65, margin: "0 0 32px", lineHeight: 1.5 }}>
            {won ? `The ${sideName} hold the field.` : `The ${sideName} fall back into the smoke.`}
          </p>
          <div style={{ display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap" }}>
            {won ? (
              <a href="/mississippi-river-forest" style={btnStyle("primary")}>Continue to River →</a>
            ) : (
              <button onClick={() => window.location.reload()} style={btnStyle("primary")}>Try Again</button>
            )}
            <a href="/" style={btnStyle("secondary")}>Choose Side</a>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: "absolute", top: 24, left: 0, right: 0, textAlign: "center", pointerEvents: "none", fontFamily: 'Georgia, "Times New Roman", serif' }}>
      <div style={{
        display: "inline-block", padding: "10px 22px",
        background: "rgba(10,10,15,0.55)",
        border: "1px solid rgba(212,168,56,0.3)",
        borderRadius: 8, color: "#e8d8b0",
      }}>
        <div style={{ fontSize: 10, letterSpacing: "0.35em", textTransform: "uppercase", opacity: 0.6 }}>
          You are the {sideName}
        </div>
        <div style={{ fontSize: 15, marginTop: 4, fontStyle: "italic", opacity: 0.92 }}>{turnText}</div>
      </div>
    </div>
  );
}

function Battlefield() {
  const p = PALETTE;

  const playerSide = useMemo(() => {
    try { return localStorage.getItem("civilwar.team") || "union"; }
    catch (e) { return "union"; }
  }, []);
  const enemySide = playerSide === "union" ? "confederate" : "union";

  const [units, setUnits] = useState(() => {
    const u = {};
    UNIT_DEFS.forEach((d) => { u[d.id] = { hp: STARTING_HP }; });
    return u;
  });
  const [turn, setTurn] = useState("player");
  const [selected, setSelected] = useState(null);
  const [status, setStatus] = useState("playing");
  const [message, setMessage] = useState("");

  const attackable = useMemo(() => {
    if (!selected || turn !== "player" || status !== "playing") return [];
    return UNIT_DEFS.filter((d) => d.faction === enemySide && units[d.id].hp > 0).map((d) => d.id);
  }, [selected, turn, status, units, enemySide]);

  useEffect(() => {
    if (status !== "playing") return;
    const playerAlive = UNIT_DEFS.some((d) => d.faction === playerSide && units[d.id].hp > 0);
    const enemyAlive = UNIT_DEFS.some((d) => d.faction === enemySide && units[d.id].hp > 0);
    if (!enemyAlive) setStatus("won");
    else if (!playerAlive) setStatus("lost");
  }, [units, playerSide, enemySide, status]);

  useEffect(() => {
    if (turn !== "enemy" || status !== "playing") return;
    const t = setTimeout(() => {
      const playerAlive = UNIT_DEFS.filter((d) => d.faction === playerSide && units[d.id].hp > 0);
      if (playerAlive.length === 0) return;
      const target = playerAlive[Math.floor(Math.random() * playerAlive.length)];
      setUnits((prev) => ({ ...prev, [target.id]: { hp: prev[target.id].hp - 1 } }));
      setMessage("");
      setTurn("player");
    }, 1100);
    return () => clearTimeout(t);
  }, [turn, status, playerSide]);

  const getClickHandler = (id) => {
    if (status !== "playing" || turn !== "player") return null;
    const def = UNIT_DEFS.find((d) => d.id === id);
    if (!def) return null;
    if (def.faction === playerSide) {
      return () => setSelected((prev) => (prev === id ? null : id));
    }
    if (selected) {
      return () => {
        setUnits((prev) => ({ ...prev, [id]: { hp: prev[id].hp - 1 } }));
        setSelected(null);
        setMessage("Enemy turn…");
        setTurn("enemy");
      };
    }
    return null;
  };

  const [parallax, setParallax] = useState({ x: 0, y: 0 });
  useEffect(() => {
    const onMove = (e) => {
      const w = window.innerWidth, h = window.innerHeight;
      setParallax({ x: (e.clientX / w - 0.5) * 2, y: (e.clientY / h - 0.5) * 2 });
    };
    window.addEventListener("mousemove", onMove);
    return () => window.removeEventListener("mousemove", onMove);
  }, []);

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", overflow: "hidden" }}>
      <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" style={{ width: "100%", height: "100%", display: "block" }}>
        <Defs p={p} />

        <g style={{ transform: `translate(${parallax.x * -8}px, ${parallax.y * -4}px)` }}>
          <Sky p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -14}px, ${parallax.y * -6}px)` }}>
          <DistantSmoke p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -22}px, ${parallax.y * -8}px)` }}>
          <FarRidge p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -32}px, ${parallax.y * -10}px)` }}>
          <NearRidge p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -50}px, ${parallax.y * -16}px)` }}>
          <SmokeWisps density={SMOKE_DENSITY} p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -42}px, ${parallax.y * -8}px)` }}>
          <Mud p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -60}px, ${parallax.y * -14}px)` }}>
          <ScatteredDebris p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -70}px, ${parallax.y * -16}px)` }}>
          <BrokenCannon p={p} />
          <HorseSkeleton p={p} />
          <BrokenWagon p={p} />
          <TornFlag p={p} />
        </g>

        <g style={{ transform: `translate(${parallax.x * -38}px, ${parallax.y * -12}px)` }}>
          <Soldiers p={p} units={units} selected={selected} attackable={attackable} getClickHandler={getClickHandler} />
        </g>

        <g style={{ transform: `translate(${parallax.x * -80}px, ${parallax.y * -18}px)`, pointerEvents: "none" }}>
          <Flames intensity={FLAME_INTENSITY} p={p} />
        </g>
        <g style={{ transform: `translate(${parallax.x * -100}px, ${parallax.y * -22}px)`, pointerEvents: "none" }}>
          <HalfBuriedPistol p={p} />
          <HalfBuriedPistol2 p={p} />
        </g>

        <FogOverlay density={FOG_DENSITY} p={p} />
        <Overlay />
      </svg>

      <HUD playerSide={playerSide} turn={turn} status={status} selected={selected} message={message} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Battlefield />);
  </script>
</body>
</html>

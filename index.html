<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Civil War — Choose Your Side</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0a0e1f;
    --ink: #e8d8b0;
    --ink-dim: rgba(232, 216, 176, 0.55);
    --gold: #d4a838;
    --union: #1f2a4a;
    --union-hi: #2a3858;
    --confed: #7a6a48;
    --confed-hi: #9a8a68;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: Georgia, "Times New Roman", serif; }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(217, 122, 58, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 100%, rgba(111, 168, 192, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, #060810 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px 80px;
  }
  header { text-align: center; max-width: 760px; margin-bottom: 56px; }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.85;
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 400;
    margin: 0 0 18px;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .tagline {
    color: var(--ink-dim);
    font-style: italic;
    font-size: 18px;
    line-height: 1.5;
    max-width: 560px;
    margin: 0 auto;
  }
  main {
    width: 100%;
    max-width: 880px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 28px;
  }
  .team {
    appearance: none;
    background: transparent;
    color: inherit;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    overflow: hidden;
    padding: 0;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .team:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  }
  .team .swatch {
    height: 200px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 24px;
  }
  .team-union .swatch {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05) 0%, transparent 60%),
      linear-gradient(160deg, var(--union-hi) 0%, var(--union) 50%, #0e1428 100%);
  }
  .team-confederate .swatch {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05) 0%, transparent 60%),
      linear-gradient(160deg, var(--confed-hi) 0%, var(--confed) 50%, #5a4a30 100%);
  }
  .flag {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 60px;
    height: 40px;
  }
  .body { padding: 22px 24px 24px; }
  .label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .team h2 {
    margin: 0 0 8px;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.1;
  }
  .leader {
    color: var(--ink-dim);
    font-size: 14px;
    font-style: italic;
    margin: 0 0 14px;
  }
  .desc {
    color: var(--ink-dim);
    font-size: 14px;
    line-height: 1.5;
    margin: 0;
  }
  .cta {
    margin-top: 18px;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }
  .team:hover .cta { opacity: 1; }
  footer {
    margin-top: 56px;
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
  }
  footer a { color: inherit; text-decoration: none; border-bottom: 1px dotted currentColor; padding-bottom: 1px; }
  footer a:hover { color: var(--ink); }
</style>
</head>
<body>
  <header>
    <div class="eyebrow">A Browser Game</div>
    <h1>Civil War</h1>
    <p class="tagline">Choose your side. The first battle waits at dusk.</p>
  </header>

  <main>
    <button class="team team-union" data-team="union">
      <div class="swatch">
        <svg class="flag" viewBox="0 0 60 40" aria-hidden="true">
          <rect x="0" y="0" width="60" height="40" fill="#1f2a4a" />
          <rect x="24" y="0" width="36" height="3" fill="#c8201f" />
          <rect x="24" y="6" width="36" height="3" fill="#e8d8a8" />
          <rect x="24" y="12" width="36" height="3" fill="#c8201f" />
          <rect x="0" y="18" width="60" height="3" fill="#e8d8a8" />
          <rect x="0" y="24" width="60" height="3" fill="#c8201f" />
          <rect x="0" y="30" width="60" height="3" fill="#e8d8a8" />
          <rect x="0" y="36" width="60" height="3" fill="#c8201f" />
          <g fill="#e8d8a8">
            <circle cx="6" cy="6" r="0.8" /><circle cx="12" cy="6" r="0.8" /><circle cx="18" cy="6" r="0.8" />
            <circle cx="6" cy="11" r="0.8" /><circle cx="12" cy="11" r="0.8" /><circle cx="18" cy="11" r="0.8" />
          </g>
        </svg>
      </div>
      <div class="body">
        <div class="label">North</div>
        <h2>Union</h2>
        <p class="leader">Led by Abraham Lincoln</p>
        <p class="desc">Hold the line. Preserve what is whole.</p>
        <div class="cta">Choose Union →</div>
      </div>
    </button>

    <button class="team team-confederate" data-team="confederate">
      <div class="swatch">
        <svg class="flag" viewBox="0 0 60 40" aria-hidden="true">
          <rect x="0" y="0" width="60" height="40" fill="#9a2018" />
          <path d="M0,0 L60,40 M60,0 L0,40" stroke="#1f2a4a" stroke-width="3.5" />
          <g fill="#e8d8a8">
            <circle cx="30" cy="20" r="0.9" />
            <circle cx="20" cy="13.3" r="0.7" /><circle cx="40" cy="13.3" r="0.7" />
            <circle cx="20" cy="26.7" r="0.7" /><circle cx="40" cy="26.7" r="0.7" />
          </g>
        </svg>
      </div>
      <div class="body">
        <div class="label">South</div>
        <h2>Confederate</h2>
        <p class="leader">Led by Robert E. Lee</p>
        <p class="desc">Take the field. Carry the day.</p>
        <div class="cta">Choose Confederate →</div>
      </div>
    </button>
  </main>

  <footer>
    Alpha · <a href="/scenes">Preview scenes</a> · Game logic in progress
  </footer>

  <script>
    document.querySelectorAll('.team').forEach((btn) => {
      btn.addEventListener('click', () => {
        const team = btn.dataset.team;
        try { localStorage.setItem('civilwar.team', team); } catch (e) {}
        window.location.href = '/civil-war-battlefield';
      });
    });
  </script>
</body>
</html>
